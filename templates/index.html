<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passport Automation System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 font-['Inter'] min-h-screen p-4 md:p-10">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        
        <div class="bg-blue-600 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Passport Portal</h1>
                <p class="text-blue-100 opacity-80 text-sm">Government of India - Automation System</p>
            </div>
            <a href="/track" class="bg-white text-blue-600 px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-50 transition shadow-md">
                🔍 Track Status
            </a>
        </div>

        <div class="p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-blue-100 text-blue-600 p-2 rounded-lg mr-3">📝</span>
                New Application Form
            </h2>

            <form action="/apply" method="POST" class="space-y-5">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Full Name</label>
                        <input type="text" name="full_name" placeholder="As per documents" 
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Date of Birth</label>
                        <input type="date" name="dob" max="2026-12-31"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Gender</label>
                        <select name="gender" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition cursor-pointer">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Aadhar Number (12 Digits)</label>
                        <input type="text" name="aadhar_no" placeholder="Enter [Aadhar Redacted]" maxlength="12" minlength="12"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Residential Address</label>
                    <textarea name="address" rows="3" placeholder="Full address with pincode" 
                              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transform transition active:scale-[0.98]">
                    Submit Application
                </button>
            </form>
            <div class="mt-10 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm italic">Already applied for a passport?</p>
                
                <div class="flex flex-col md:flex-row justify-center items-center gap-4 mt-3">
                    <a href="javascript:void(0)" 
                       onclick="let val = prompt('Enter Application ID or Aadhar:'); if(val) window.location.href='/track/' + val;" 
                       class="text-blue-600 font-bold hover:underline bg-blue-50 px-4 py-2 rounded-lg">
                       ⚡ Quick Track via Prompt
                    </a>

                    <span class="text-gray-300 hidden md:block">|</span>

                    <a href="/track" class="text-blue-600 font-bold hover:underline">
                       Go to Tracking Page
                    </a>
                </div>
            </div>
        </div>
    </div>

    <p class="text-center text-gray-400 text-xs mt-8 font-medium">
        &copy; 2026 Passport Automation System | Secure Data Encryption Active
    </p>

</body>
</html>
