<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passport Automation System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10 flex items-center justify-center">

    <div class="max-w-3xl w-full glass-card rounded-[2.5rem] shadow-2xl overflow-hidden" data-aos="fade-up">
        
        <div class="bg-blue-600 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Passport Portal</h1>
                <p class="text-blue-100 text-sm">Government of India - Automation System</p>
            </div>
            <a href="/track" class="bg-white text-blue-600 px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-50 transition shadow-md">🔍 Track Status</a>
        </div>

        <div class="p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-blue-100 text-blue-600 p-2 rounded-lg mr-3">📝</span> New Application Form
            </h2>

            <form action="/apply" method="POST" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label for="full_name" class="block text-sm font-semibold text-gray-600 mb-2">Full Name</label>
                        <input type="text" id="full_name" name="full_name" autocomplete="name" placeholder="As per documents" 
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>

                    <div>
                        <label for="dob" class="block text-sm font-semibold text-gray-600 mb-2">Date of Birth</label>
                        <input type="date" id="dob" name="dob" autocomplete="bday"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label for="gender" class="block text-sm font-semibold text-gray-600 mb-2">Gender</label>
                        <select id="gender" name="gender" autocomplete="sex" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label for="aadhar_no" class="block text-sm font-semibold text-gray-600 mb-2">Aadhar Number (12 Digits)</label>
                        <input type="text" id="aadhar_no" name="aadhar_no" autocomplete="off" placeholder="Enter 12 digits" maxlength="12" minlength="12"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>

                <div>
                    <label for="address" class="block text-sm font-semibold text-gray-600 mb-2">Residential Address</label>
                    <textarea id="address" name="address" rows="3" autocomplete="street-address" placeholder="Full address with pincode" 
                              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition transform active:scale-95">
                    Submit Application
                </button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init(); </script>
</body>
</html>
