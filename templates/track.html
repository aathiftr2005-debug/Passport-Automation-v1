<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status | Passport Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .status-badge { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-50 via-blue-50 to-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] shadow-[0_22px_70px_4px_rgba(0,0,0,0.1)] overflow-hidden" data-aos="zoom-in" data-aos-duration="800">
        
        <div class="bg-blue-600 p-8 text-center relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Live Tracking</h1>
                <p class="text-blue-100 text-sm opacity-90 mt-1 font-medium italic">Check your application progress</p>
            </div>
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-white/10 rounded-full animate-pulse"></div>
        </div>

        <div class="p-8">
            <form action="/track" method="POST" class="space-y-5">
                <div data-aos="fade-up" data-aos-delay="200">
                    <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">Application ID or Aadhar</label>
                    <input type="text" name="app_id" placeholder="Enter ID to search..." 
                           class="w-full px-5 py-4 bg-gray-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all duration-300 shadow-inner" 
                           required>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-2xl shadow-lg transform transition-all hover:-translate-y-1 active:scale-95" data-aos="fade-up" data-aos-delay="300">
                    Search Status 🔍
                </button>
            </form>

            {% if data %}
                <div class="mt-8 p-6 bg-white rounded-3xl border border-blue-50 shadow-xl" data-aos="fade-up" data-aos-duration="600">
                    <h3 class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-5 border-b border-gray-50 pb-2">Applicant Profile</h3>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-500 font-medium text-sm">Full Name</span>
                            <span class="font-bold text-gray-800">{{ data[0] }}</span>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <span class="text-gray-500 font-medium text-sm">Status</span>
                            <span class="status-badge px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-wider 
                                {% if data[1] == 'Approved' %} bg-green-100 text-green-600 border border-green-200
                                {% elif data[1] == 'Rejected' %} bg-red-100 text-red-600 border border-red-200
                                {% else %} bg-orange-100 text-orange-600 border border-orange-200 {% endif %}">
                                {{ data[1] }}
                            </span>
                        </div>

                        <div class="pt-4 mt-2 border-t border-gray-50 flex flex-col items-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter italic">
                                File Date: {{ data[2] }}
                            </p>
                        </div>
                    </div>
                </div>
            {% elif data == None and request.method == 'POST' %}
                <div class="mt-6 p-5 bg-red-50 text-red-500 text-xs font-black rounded-2xl text-center border border-red-100 animate-pulse">
                    ⚠️ Application not found. Please verify the ID!
                </div>
            {% endif %}

            <div class="mt-10 text-center" data-aos="fade" data-aos-delay="500">
                <a href="/" class="group text-sm font-bold text-blue-600 hover:text-blue-800 transition-all flex items-center justify-center">
                    <span class="mr-2 transition-transform group-hover:-translate-x-1">←</span> Back to Main Portal
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
    </script>
</body>
</html>
