<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Application Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 font-['Inter'] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-2xl font-bold text-white">Live Tracking</h1>
            <p class="text-blue-100 text-sm mt-1">Check your application status</p>
        </div>

        <div class="p-8">
            <form action="/track" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Application ID</label>
                    <input type="text" name="app_id" placeholder="Enter ID (e.g., 1)" 
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                           required>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-300">
                    Check Status
                </button>
            </form>

            {% if data %}
                <div class="mt-8 p-6 bg-blue-50 rounded-2xl border border-blue-100 animate-fade-in">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Application Details</h3>
                    
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Name:</span>
                            <span class="font-semibold text-gray-800">{{ data[0] }}</span>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">Current Status:</span>
                            <span class="px-3 py-1 rounded-full text-xs font-bold 
                                {% if data[1] == 'Approved' %} bg-green-200 text-green-800 
                                {% elif data[1] == 'Rejected' %} bg-red-200 text-red-800 
                                {% else %} bg-yellow-200 text-yellow-800 {% endif %}">
                                {{ data[1] }}
                            </span>
                        </div>

                        <div class="pt-4 border-t border-blue-100 text-center">
                            <p class="text-[10px] text-gray-400 font-medium tracking-tight">Applied on: {{ data[2] }}</p>
                        </div>
                    </div>
                </div>
            {% elif data == None and request.method == 'POST' %}
                <div class="mt-6 p-4 bg-red-50 text-red-600 text-sm font-semibold rounded-xl text-center border border-red-100">
                    ❌ Invalid Application ID. Check again!
                </div>
            {% endif %}

            <div class="mt-8 text-center">
                <a href="/" class="text-sm font-semibold text-blue-600 hover:text-blue-800 underline">
                    Go back to Application Form
                </a>
            </div>
        </div>
    </div>

</body>
</html>
