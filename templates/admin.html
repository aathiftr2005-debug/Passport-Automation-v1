<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Admin - Passport Applications</h1>
        <table class="min-w-full bg-white border">
            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="py-2 px-4 border">Name</th>
                    <th class="py-2 px-4 border">Aadhar No</th>
                    <th class="py-2 px-4 border">Status</th>
                    <th class="py-2 px-4 border">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr class="text-center border-b">
                    <td class="py-2 px-4">{{ app[1] }}</td>
                    <td class="py-2 px-4">{{ app[4] }}</td>
                    <td class="py-2 px-4 font-bold text-blue-600">{{ app[6] }}</td>
                    <td class="py-2 px-4">
                        <a href="/update_status/{{ app[0] }}/Approved" class="bg-green-500 text-white px-3 py-1 rounded">Approve</a>
                        <a href="/update_status/{{ app[0] }}/Rejected" class="bg-red-500 text-white px-3 py-1 rounded ml-2">Reject</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="mt-4 inline-block text-blue-500 underline">Back to Home</a>
    </div>
</body>
</html>
